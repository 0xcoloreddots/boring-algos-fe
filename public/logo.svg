<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background square -->
  <rect width="512" height="512" rx="64" fill="#0a0a0a"/>

  <!-- Grid lines (subtle) -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#262626" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="#262626" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="#262626" stroke-width="1.5"/>
  <line x1="80" y1="160" x2="432" y2="160" stroke="#262626" stroke-width="1.5"/>

  <!-- Candlestick wicks -->
  <line x1="144" y1="180" x2="144" y2="340" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <line x1="224" y1="200" x2="224" y2="370" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <line x1="304" y1="140" x2="304" y2="300" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
  <line x1="384" y1="100" x2="384" y2="260" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>

  <!-- Candlestick bodies -->
  <rect x="124" y="220" width="40" height="80" rx="4" fill="#eab308"/>
  <rect x="204" y="240" width="40" height="90" rx="4" fill="#eab308" opacity="0.4"/>
  <rect x="284" y="170" width="40" height="80" rx="4" fill="#eab308"/>
  <rect x="364" y="130" width="40" height="80" rx="4" fill="#eab308"/>

  <!-- Uptrend arrow overlay -->
  <polyline points="144,300 224,280 304,200 384,140" stroke="#eab308" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <polygon points="384,140 360,160 375,162" fill="#eab308" opacity="0.6"/>

  <!-- "BA" monogram -->
  <text x="256" y="460" text-anchor="middle" font-family="'Consolas','Courier New',monospace" font-weight="bold" font-size="72" fill="#eab308" letter-spacing="12">BA</text>
</svg>
